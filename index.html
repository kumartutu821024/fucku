<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KGS Web</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Outfit',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
    overflow:hidden;
}

.bg{
    position:absolute;
    width:500px;
    height:500px;
    border-radius:50%;
    filter:blur(120px);
    opacity:.4;
}

.bg1{
    background:#f39c12;
    top:-150px;
    left:-150px;
}

.bg2{
    background:#3b82f6;
    bottom:-150px;
    right:-150px;
}

.card{
    width:90%;
    max-width:420px;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.15);
    border-radius:30px;
    padding:40px;
    text-align:center;
    color:#fff;
    box-shadow:0 20px 50px rgba(0,0,0,.3);
}

.logo{
    width:90px;
    height:90px;
    margin:auto;
    border-radius:25px;
    background:linear-gradient(135deg,#f39c12,#ffcc00);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:40px;
    margin-bottom:20px;
}

h1{
    font-size:28px;
    font-weight:800;
    margin-bottom:10px;
}

p{
    color:#cbd5e1;
    margin-bottom:30px;
    line-height:1.6;
}

.btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    width:100%;
    padding:16px;
    border:none;
    border-radius:18px;
    text-decoration:none;
    font-size:18px;
    font-weight:700;
    color:#fff;
    background:linear-gradient(135deg,#f39c12,#ffb300);
    box-shadow:0 10px 25px rgba(243,156,18,.4);
    transition:.3s;
}

.btn:hover{
    transform:translateY(-4px);
    box-shadow:0 15px 35px rgba(243,156,18,.6);
}

.footer{
    margin-top:20px;
    color:#94a3b8;
    font-size:13px;
}
</style>
</head>
<body>

<div class="bg bg1"></div>
<div class="bg bg2"></div>

<div class="card">
    <div class="logo">🎓</div>

    <h1>KGS Web Portal</h1>

    <p>
        Welcome to KGS Learning Platform.<br>
        Click below to open the learning dashboard.
    </p>

    <a href="https://kgsfreebatchall2.vercel.app/" class="btn">
        🚀 Open KGS Web
    </a>

    <div class="footer">
        Powered by
    </div>
</div>

</body>
</html>
